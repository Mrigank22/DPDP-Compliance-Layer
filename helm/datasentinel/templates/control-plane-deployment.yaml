{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datasentinel.controlPlane.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  {{- if not .Values.controlPlane.autoscaling.enabled }}
  replicas: {{ .Values.controlPlane.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "datasentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "datasentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
        {{- with .Values.controlPlane.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmaps.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- with .Values.controlPlane.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "datasentinel.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "datasentinel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: control-plane
          image: {{ include "datasentinel.image" (dict "root" $ "svc" .Values.controlPlane) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "datasentinel.controlPlane.fullname" . }}
            - secretRef:
                name: {{ include "datasentinel.controlPlane.fullname" . }}
          {{- with .Values.controlPlane.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/datasentinel/jwt
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
      volumes:
        - name: jwt-keys
          secret:
            secretName: {{ include "datasentinel.jwtSecretName" . }}
            items:
              - key: jwt_private.pem
                path: jwt_private.pem
              - key: jwt_public.pem
                path: jwt_public.pem
      {{- with .Values.controlPlane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.controlPlane.affinity }}
      affinity:
        {{- toYaml .Values.controlPlane.affinity | nindent 8 }}
      {{- else if (include "datasentinel.podAntiAffinity" (dict "root" $ "component" "control-plane")) | trim }}
      affinity:
        {{- include "datasentinel.podAntiAffinity" (dict "root" $ "component" "control-plane") | nindent 8 }}
      {{- end }}
{{- end }}
