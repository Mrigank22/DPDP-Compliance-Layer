{{/*
  Optional NetworkPolicies. Default-deny ingress to all release pods, then
  explicitly allow intra-release traffic and ingress-controller traffic to the
  externally-reachable services. Egress is left open so pods can reach the
  external PostgreSQL/Redis/ClickHouse and cloud provider APIs; only DNS is
  added explicitly when allowDNS=true.
*/}}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "datasentinel.fullname" . }}-default-deny-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "datasentinel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "datasentinel.fullname" . }}-allow-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "datasentinel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "datasentinel.fullname" . }}-allow-ingress-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: ["control-plane", "gateway", "frontend"]
      - key: app.kubernetes.io/instance
        operator: In
        values: [{{ .Release.Name | quote }}]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
{{- if .Values.networkPolicy.allowDNS }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "datasentinel.fullname" . }}-allow-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "datasentinel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Leave all other egress open (external DB/Redis/ClickHouse/cloud APIs).
    - {}
{{- end }}
{{- end }}
