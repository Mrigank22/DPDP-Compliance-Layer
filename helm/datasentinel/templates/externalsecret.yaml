{{/*
  External Secrets Operator integration (https://external-secrets.io).
  When externalSecrets.enabled=true, one ExternalSecret per service syncs a
  Kubernetes Secret with the SAME name the Deployments mount. Store the env-var
  keys (DATABASE_URL, REDIS_URL, MASTER_ENCRYPTION_KEY, …) in the remote secret.
*/}}
{{- if .Values.externalSecrets.enabled }}
{{- $top := . }}
{{- range $svc := list "controlPlane" "gateway" "workers" }}
{{- $cfg := index $top.Values $svc }}
{{- if $cfg.enabled }}
{{- $name := "" }}
{{- $remoteKey := "" }}
{{- if eq $svc "controlPlane" }}{{ $name = include "datasentinel.controlPlane.fullname" $top }}{{ $remoteKey = $top.Values.externalSecrets.controlPlaneRemoteKey }}{{- end }}
{{- if eq $svc "gateway" }}{{ $name = include "datasentinel.gateway.fullname" $top }}{{ $remoteKey = $top.Values.externalSecrets.gatewayRemoteKey }}{{- end }}
{{- if eq $svc "workers" }}{{ $name = include "datasentinel.workers.fullname" $top }}{{ $remoteKey = $top.Values.externalSecrets.workersRemoteKey }}{{- end }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  namespace: {{ $top.Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" $top | nindent 4 }}
    app.kubernetes.io/component: {{ $svc | kebabcase }}
spec:
  refreshInterval: {{ $top.Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $top.Values.externalSecrets.secretStoreRef.name }}
    kind: {{ $top.Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ $name }}
    creationPolicy: Owner
    template:
      metadata:
        labels:
          {{- include "datasentinel.labels" $top | nindent 10 }}
          app.kubernetes.io/component: {{ $svc | kebabcase }}
  dataFrom:
    - extract:
        key: {{ $remoteKey | quote }}
---
{{- end }}
{{- end }}
{{/* JWT material via ESO (optional). Targets the JWT secret name the pods mount. */}}
{{- if .Values.externalSecrets.jwtRemoteKey }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "datasentinel.jwtSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: jwt
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "datasentinel.jwtSecretName" . }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecrets.jwtRemoteKey | quote }}
{{- end }}
{{- end }}
