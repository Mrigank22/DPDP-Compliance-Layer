{{/*
  Prometheus Operator ServiceMonitors. Requires the monitoring.coreos.com CRDs.
  The gateway exposes Prometheus metrics on its HTTP port at /metrics.
*/}}
{{- if .Values.metrics.serviceMonitor.enabled }}
{{- if .Values.gateway.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "datasentinel.gateway.fullname" . }}
  namespace: {{ .Values.metrics.serviceMonitor.namespace | default .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "datasentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- if and .Values.controlPlane.enabled .Values.metrics.serviceMonitor.controlPlane }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "datasentinel.controlPlane.fullname" . }}
  namespace: {{ .Values.metrics.serviceMonitor.namespace | default .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "datasentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
