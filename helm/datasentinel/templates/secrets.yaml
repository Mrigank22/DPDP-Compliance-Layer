{{/*
  Per-service Secrets. Rendered when secrets.create=true and External Secrets
  is not managing them. CLICKHOUSE_URL/REDIS host data live in the ConfigMap;
  only credential-bearing values live here.
*/}}
{{- if and .Values.secrets.create (not .Values.externalSecrets.enabled) }}
{{- $redisBase := include "datasentinel.redisBase" . }}
{{- $dbUrl := include "datasentinel.databaseUrl" . }}
{{- if .Values.controlPlane.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datasentinel.controlPlane.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
type: Opaque
stringData:
  DATABASE_URL: {{ $dbUrl | quote }}
  REDIS_URL: {{ printf "%s/%v" $redisBase .Values.redis.controlPlaneDB | quote }}
  WORKER_REDIS_URL: {{ printf "%s/%v" $redisBase .Values.redis.workerQueueDB | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.password | quote }}
  MASTER_ENCRYPTION_KEY: {{ .Values.secrets.masterEncryptionKey | quote }}
  INTERNAL_API_KEY: {{ .Values.secrets.internalApiKey | quote }}
  SMTP_HOST: {{ .Values.controlPlane.smtp.host | quote }}
  SMTP_USER: {{ .Values.controlPlane.smtp.user | quote }}
  SMTP_PASSWORD: {{ .Values.controlPlane.smtp.password | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.controlPlane.aws.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.controlPlane.aws.secretAccessKey | quote }}
{{- end }}
{{- if .Values.gateway.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datasentinel.gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
type: Opaque
stringData:
  DATABASE_URL: {{ $dbUrl | quote }}
  REDIS_URL: {{ printf "%s/%v" $redisBase .Values.redis.gatewayDB | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.password | quote }}
  MASTER_ENCRYPTION_KEY: {{ .Values.secrets.masterEncryptionKey | quote }}
  CONTROL_PLANE_API_KEY: {{ .Values.secrets.internalApiKey | quote }}
{{- end }}
{{- if .Values.workers.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datasentinel.workers.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: workers
type: Opaque
stringData:
  # Workers consume the Celery broker the control-plane publishes to
  # (redis.workerQueueDB) so task hand-off works end to end.
  DATABASE_URL: {{ $dbUrl | quote }}
  REDIS_URL: {{ printf "%s/%v" $redisBase .Values.redis.workerQueueDB | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.password | quote }}
  MASTER_ENCRYPTION_KEY: {{ .Values.secrets.masterEncryptionKey | quote }}
  CONTROL_PLANE_API_KEY: {{ .Values.secrets.internalApiKey | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.workers.aws.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.workers.aws.secretAccessKey | quote }}
  AZURE_STORAGE_CONNECTION_STRING: {{ .Values.workers.azure.storageConnectionString | quote }}
{{- end }}
{{- end }}
{{/* ---- JWT signing material -------------------------------------------------- */}}
{{- if and .Values.jwt.create (not .Values.jwt.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datasentinel.jwtSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "datasentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: jwt
type: Opaque
stringData:
  jwt_private.pem: |-
{{ .Values.jwt.privateKey | default "" | indent 4 }}
  jwt_public.pem: |-
{{ .Values.jwt.publicKey | default "" | indent 4 }}
{{- end }}
