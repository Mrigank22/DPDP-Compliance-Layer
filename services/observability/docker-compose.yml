# services/observability/docker-compose.yml
# Minimal observability stack: Prometheus scrapes the control-plane and gateway
# /metrics endpoints; Grafana visualises them with a pre-provisioned dashboard.
#
#   docker compose -f docker-compose.yml up -d
#   Prometheus → http://localhost:9090
#   Grafana    → http://localhost:3030  (admin / admin)

services:
  prometheus:
    image: prom/prometheus:v3.6.0
    container_name: datasentinel-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.0
    container_name: datasentinel-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3030:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
